$kind: http-request
name: Google Login
method: POST
url: '{{baseUrl}}/auth/google'
order: 7000
description: Login or register using Google OAuth. Send Google ID token from frontend.
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "idToken": "google-id-token-from-frontend"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.expect(pm.response.code).to.equal(200);
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      if (pm.response.code === 200) {
          const response = pm.response.json();

          pm.test("Response contains accessToken as string", function () {
              pm.expect(response).to.have.property("accessToken");
              pm.expect(response.accessToken).to.be.a("string");
          });

          pm.test("Response contains refreshToken as string", function () {
              pm.expect(response).to.have.property("refreshToken");
              pm.expect(response.refreshToken).to.be.a("string");
          });

          if (response.accessToken) {
              pm.environment.set("accessToken", response.accessToken);
          }
          if (response.refreshToken) {
              pm.environment.set("refreshToken", response.refreshToken);
          }
      }