$kind: http-request
name: Set Primary Bank Account
method: PATCH
url: '{{baseUrl}}/bank-accounts/{{bankAccountId}}/set-primary'
order: 3000
description: Set a bank account as the primary account for payouts
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
pathVariables:
  - key: bankAccountId
    value: '{{bankAccountId}}'
    description: Bank account UUID
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.expect(pm.response.code).to.equal(200);
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      if (pm.response.code !== 204 && pm.response.text()) {
          pm.test("Response is JSON", function () {
              pm.response.to.be.json;
          });

          pm.test("Response is an object", function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.be.an("object");
          });
      }