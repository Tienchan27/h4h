$kind: http-request
name: Admin Tutors Detail
method: GET
url: '{{baseUrl}}/dashboard/admin/tutors/detail'
order: 2000
description: Admin dashboard - get detailed tutor information
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
queryParams:
  - key: tutorId
    value: '{{tutorId}}'
    description: Optional tutor UUID to filter
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.expect(pm.response.code).to.equal(200);
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Response is an array", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("array");
      });