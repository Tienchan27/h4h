$kind: http-request
name: Verify Bank Account
method: POST
url: '{{baseUrl}}/admin/bank-accounts/{{bankAccountId}}/verify'
order: 1000
description: Admin endpoint to verify a bank account
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
pathVariables:
  - key: bankAccountId
    value: '{{bankAccountId}}'
    description: Bank account UUID to verify
body:
  type: json
  content: |-
    {
      "notes": "Verified via bank statement"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.expect(pm.response.code).to.equal(200);
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      if (pm.response.code !== 204 && pm.response.text()) {
          pm.test("Response is JSON", function () {
              pm.response.to.be.json;
          });

          pm.test("Response is an object", function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.be.an("object");
          });
      }