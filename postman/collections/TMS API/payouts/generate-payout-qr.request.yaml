$kind: http-request
name: Generate Payout QR
method: POST
url: '{{baseUrl}}/payouts/{{payoutId}}/qr'
order: 2000
description: Generate QR code for a payout
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
pathVariables:
  - key: payoutId
    value: '{{payoutId}}'
    description: Payout UUID
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.expect(pm.response.code).to.equal(200);
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      if (pm.response.code === 200) {
          const response = pm.response.json();

          pm.test("Response is an object", function () {
              pm.expect(response).to.be.an("object");
          });

          if (response.id) {
              pm.environment.set("payoutId", response.id);
          }
      }