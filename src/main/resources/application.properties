spring.application.name=tms
server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/tms_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tms_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tms_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
server.error.include-message=always

app.timezone=Asia/Ho_Chi_Minh
app.security.jwt-secret=dev-secret-key-change-in-production-dev-secret-key
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
spring.mail.host=localhost
spring.mail.port=1025
