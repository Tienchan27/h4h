services:
  postgres-db:
    image: postgres:latest
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: h4h_db
      POSTGRES_USER: h4h_user
      POSTGRES_PASSWORD: h4h_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - h4h-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U h4h_user -d h4h_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  h4h-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
